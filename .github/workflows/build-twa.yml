name: Build TWA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Setup Bubblewrap
        run: yes | bubblewrap doctor

      - name: Generate Dummy Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Loki, O=Dev, C=US"

      - name: Ensure Valid Icon URL
        run: |
          if ! curl --output /dev/null --silent --head --fail "https://loki-x-prime.vercel.app/icon-512x512.png"; then
            echo "Icon not found! Replacing with a working placeholder icon to prevent build crash."
            sed -i 's|https://loki-x-prime.vercel.app/icon-512x512.png|https://raw.githubusercontent.com/GoogleChromeLabs/bubblewrap/main/app/assets/logo512.png|g' twa-manifest.json
          fi

      - name: Build TWA with Bubblewrap
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: password123
          BUBBLEWRAP_KEY_PASSWORD: password123
        run: yes | bubblewrap build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loki-x-prime-android-bundles
          path: |
            *.apk
            *.aab
