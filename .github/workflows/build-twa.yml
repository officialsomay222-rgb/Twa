name: Build TWA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          ANDROID_SDK_PATH="/usr/local/lib/android/sdk"
          sudo mkdir -p $ANDROID_SDK_PATH/bin
          sudo ln -sfn $ANDROID_SDK_PATH/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_PATH/bin/sdkmanager
          
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_SDK_PATH}"
          }
          EOF

      - name: Accept Android SDK Licenses
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Dummy Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -storepass password123 -keypass password123 -dname "CN=Loki, O=Dev, C=US"

      - name: Build TWA with Bubblewrap
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: password123
          BUBBLEWRAP_KEY_PASSWORD: password123
        run: |
          yes | bubblewrap update --skipVersionUpgrade || true
          yes | bubblewrap build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: loki-x-prime-android-bundles
          path: |
            *.apk
